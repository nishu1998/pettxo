name: pettexo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  lottie: ^3.1.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.4
  firebase_remote_config: ^5.0.4
  firebase_messaging: ^15.1.3

  # SVG support
  flutter_svg: ^2.0.10
  flutter_native_splash: ^2.4.7
  firebase_analytics: ^11.6.0
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0
  image: ^4.5.4
  intl_phone_field: ^3.2.0
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  google_maps_flutter: ^2.9.0
  url_launcher: ^6.3.1
  cloud_functions: ^5.6.2
  share_plus: ^13.1.0
  razorpay_flutter: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
    - assets/brand/
    - assets/data/
    - assets/splash_bg.png
    - assets/logo1024.png

fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf

flutter_native_splash:
  color: "#fcf8f5"

  image: assets/logo1024.png

  android: true
  ios: true

  android_12:
    image: assets/logo1024.png
    color: "#fcf8f5"

  android_gravity: center
  ios_content_mode: center

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo1024.png
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/logo1024.png
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: assets/logo1024.png
    icon_size: 256
  macos:
    generate: true
    image_path: assets/logo1024.png
