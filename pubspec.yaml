name: pettexo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.3.4

  # SVG support
  flutter_svg: ^2.0.10
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/splash_bg.png
    - assets/logo1024.png

flutter_native_splash:
  color: "#ffffff"

  image: assets/logo1024.png

  android: true
  ios: true

  android_12:
    image: assets/logo1024.png
    color: "#ffffff"

  android_gravity: center
  ios_content_mode: center